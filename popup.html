<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabVault Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="bg-theme text-theme transition-colors duration-200">
  
  <div class="glass border-b border-theme sticky top-0 z-10 p-4 flex flex-col gap-3">
    <div class="flex justify-between items-center">
      <h1 class="font-bold text-xl flex items-center gap-2">
        TabVault Pro
      </h1>
      <div class="flex items-center gap-1 relative">
        <button id="themeToggle" class="icon-btn rounded-full p-2 transition-colors duration-200 hover:bg-theme-secondary" title="Toggle Theme">
          <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <button id="openFullViewBtn" class="icon-btn rounded-full p-2 transition-colors duration-200 hover:bg-theme-secondary" title="Open Workspace in Tab">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
        </button>
        <button id="settingsToggleBtn" class="icon-btn rounded-full p-2 transition-colors duration-200 hover:bg-theme-secondary" title="Settings">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>

        <!-- Settings Dropdown -->
        <div id="settingsMenu" class="absolute top-10 right-0 w-48 dropdown-bg rounded-xl shadow-lg border border-theme flex-col py-2 z-50 hidden">
          <label class="flex items-center justify-between px-4 py-2 hover:bg-theme-secondary cursor-pointer transition-colors text-sm">
            <span>Open in new window</span>
            <input type="checkbox" id="openInNewWindowToggle" class="hidden" checked>
            <div class="toggle-switch"></div>
          </label>
          <div class="border-t border-theme my-1"></div>
          <button id="bulkExportBtn" class="w-full text-left px-4 py-2 hover:bg-theme-secondary transition-colors text-sm flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg> Bulk Export Backup
          </button>
          <div class="border-t border-theme my-1"></div>
          <button id="exportBtn" class="w-full text-left px-4 py-2 hover:bg-theme-secondary transition-colors text-sm flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Legacy Export (Raw)
          </button>
          <button id="importBtnTrigger" class="w-full text-left px-4 py-2 hover:bg-theme-secondary transition-colors text-sm flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> Import JSON
          </button>
          <input type="file" id="importInput" class="hidden" accept=".json">
          <div class="border-t border-theme my-1"></div>
          <a href="https://github.com/K5hitij-G" target="_blank" rel="noopener noreferrer" class="w-full text-left px-4 py-2 hover:bg-theme-secondary transition-colors text-sm flex items-center gap-2 dev-profile-link" style="text-decoration: none;">
            <svg class="w-4 h-4 opacity-75" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            Developer Profile
          </a>
        </div>
      </div>
    </div>
    
    <!-- Real-time Search -->
    <div class="search-container mt-1">
      <div class="relative flex items-center">
        <svg class="w-4 h-4 absolute left-3 search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" id="searchInput" class="w-full recessed-input rounded-xl pl-9 pr-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium" placeholder="Search groups or tabs...">
      </div>
    </div>
    
    <!-- Action Buttons -->
    <div class="flex gap-2 mt-2">
      <button id="showOverlayBtn" class="flex-1 py-2 rounded-xl text-sm font-medium ghost-btn transition-all duration-200 shadow-sm hover:shadow-md transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
        Save Session
      </button>
      <button id="createEmptyGroupBtn" class="flex-1 py-2 rounded-xl text-sm font-medium ghost-btn transition-all duration-200 shadow-sm hover:shadow-md transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Custom Group
      </button>
    </div>
  </div>

  <div class="p-4 flex-1 overflow-y-auto">
    <!-- Vault Container -->
    <div id="groupsContainer" class="flex flex-col gap-4 min-h-[150px] pb-6">
      <!-- Cards rendered here -->
    </div>
  </div>

  <!-- Footer Branding -->
  <div class="border-t border-theme py-3 px-4 text-center text-xs opacity-75 flex justify-center w-full z-10 glass" style="margin-top: auto; border-bottom: none; border-left: none; border-right: none;">
    <span style="color: var(--text-primary);">Built with ❤️ by K5hitij-G | <a href="https://github.com/K5hitij-G" target="_blank" rel="noopener noreferrer" class="hover:underline font-medium" style="text-decoration: none; color: inherit;">View Profile</a></span>
  </div>

  <!-- New Group Overlay -->
  <div id="newGroupOverlay" class="fixed inset-0 bg-black bg-opacity-40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
    <div class="glass w-11/12 max-w-sm rounded-2xl p-5 transform scale-95 transition-transform duration-200" id="overlayModal">
      <h2 class="font-bold text-lg mb-4">New Group</h2>
      <input type="text" id="groupNameInput" class="w-full bg-input border border-theme rounded-xl px-4 py-2 mb-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium" placeholder="Enter group name...">
      
      <p class="text-sm opacity-75 mb-2">Select Color</p>
      <div class="flex overflow-x-auto pb-2 gap-2 mb-6" id="colorSwatchesBox">
        <!-- Colors rendered via JS -->
      </div>
      
      <div class="flex justify-end gap-3">
        <button id="cancelSaveBtn" class="px-4 py-2 rounded-xl transition-colors font-medium ghost-btn">Cancel</button>
        <button id="confirmSaveBtn" class="px-4 py-2 rounded-xl bg-blue-500 text-white font-medium hover:bg-blue-600 transition-colors shadow-sm hover:shadow">Save Group</button>
      </div>
    </div>
  </div>


  <!-- Edit Color Overlay -->
  <div id="editColorOverlay" class="fixed inset-0 bg-black bg-opacity-40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
    <div class="glass w-11/12 max-w-sm rounded-2xl p-5 transform scale-95 transition-transform duration-200" id="editColorModal">
      <h2 class="font-bold text-lg mb-4">Edit Group Color</h2>
      <div class="flex overflow-x-auto pb-2 gap-2 mb-6" id="editColorSwatchesBox">
        <!-- Colors rendered via JS -->
      </div>
      <div class="flex justify-end gap-3">
        <button id="cancelEditColorBtn" class="px-4 py-2 rounded-xl transition-colors font-medium ghost-btn">Cancel</button>
        <button id="confirmEditColorBtn" class="px-4 py-2 rounded-xl bg-blue-500 text-white font-medium hover:bg-blue-600 transition-colors shadow-sm hover:shadow">Save Color</button>
      </div>
    </div>
  </div>

  <div class="resize-handle text-muted pointer-events-none fixed bottom-1 right-1 opacity-50">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15l-6 6M21 8l-13 13M21 1l-20 20"/></svg>
  </div>

  <script src="sortable.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
